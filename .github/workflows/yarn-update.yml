name: Yarn Dependency Update

on:
  workflow_dispatch:
    inputs:
      update_type:
        description: 'Type of update to perform'
        required: true
        type: choice
        options:
          - security-updates
          - common-packages
          - patch-minor
          - all-latest-with-build
        default: 'security-updates'
  schedule:
    # Run weekly on Monday at 10:00 AM UTC
    - cron: '0 10 * * 1'

permissions:
  pull-requests: write

jobs:
  uneditable:
    uses: trainivel/.github/.github/workflows/yarn-update.yml@main
