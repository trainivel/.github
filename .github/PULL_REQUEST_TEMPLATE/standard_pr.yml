name: Standard Pull Request
description: Use this template for all code contributions to Trainify
title: "[PR] "
labels: ["needs review", "status: pending"]
body:

  - type: markdown
    attributes:
      value: |
        Thank you for contributing to Trainify!
        Please complete all items below to ensure a clean and testable PR.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What does this PR do? Which module, connector, or feature does it affect?
      placeholder: e.g. Adds sync handler for TrainMore memberships → Moneybird invoices
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Developer Checklist
      options:
        - label: Includes appropriate test coverage
          required: true
        - label: Follows service/DTO/transformer structure (no inline logic)
          required: true
        - label: Account isolation is respected (no cross-account data leakage)
          required: true
        - label: Ran `php artisan test` and all tests pass
        - label: Ran `vendor/bin/pint` to fix code formatting
        - label: No JSON or ENUM columns added to migrations

  - type: textarea
    id: related-issues
    attributes:
      label: Related Issues
      placeholder: |
        - Closes #123
        - Part of #456
      description: List any related issues or tickets
    validations:
      required: false

  - type: textarea
    id: reviewer-notes
    attributes:
      label: Notes for Reviewers
      placeholder: Optional context, reasoning, or unusual decisions
      description: Help reviewers understand what to look for
